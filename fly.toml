app = "pressroom-app"
primary_region = "sea"

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = "8000"
  DATABASE_URL = "sqlite+aiosqlite:////app/data/pressroom.db"

[[mounts]]
  source = "pressroom_data"
  destination = "/app/data"
